name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=results.trx" --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/*.trx
          reporter: dotnet-trx

  pack:
    name: Pack & Publish
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write   # required for NuGet trusted publishing OIDC token
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/Polly.Contrib.OpenTelemetry/Polly.Contrib.OpenTelemetry.csproj
          --configuration Release
          --no-build
          --output nupkgs
          /p:Version=${{ steps.version.outputs.version }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkgs/*.nupkg
          retention-days: 30

      - name: Debug raw NuGet token exchange
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        env:
          NUGET_USERNAME: ${{ secrets.NUGET_USERNAME }}
        with:
          script: |
            // Get OIDC token for NuGet audience
            const oidcToken = await core.getIDToken('https://www.nuget.org')

            // Decode JWT payload for inspection
            const payload = JSON.parse(Buffer.from(oidcToken.split('.')[1], 'base64url').toString())
            core.info('=== OIDC Claims ===')
            for (const k of ['sub','repository','repository_owner','workflow','workflow_ref','job_workflow_ref','ref','event_name']) {
              if (payload[k]) core.info(`${k}: ${payload[k]}`)
            }

            // Raw token exchange
            core.info('=== Token Exchange ===')
            core.info(`username: ${process.env.NUGET_USERNAME}`)
            const resp = await fetch('https://www.nuget.org/api/v2/token', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${oidcToken}`,
                'Content-Type': 'application/json',
                'User-Agent': 'debug/1.0'
              },
              body: JSON.stringify({ username: process.env.NUGET_USERNAME, tokenType: 'ApiKey' })
            })
            const body = await resp.text()
            core.info(`HTTP Status: ${resp.status}`)
            core.info(`Response: ${body}`)

      # Exchange GitHub OIDC token for a short-lived NuGet API key via trusted publishing.
      # Requires: id-token: write permission above, and a Trusted Publisher configured
      # on nuget.org pointing to this repo + workflow.
      - name: NuGet login (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USERNAME }}

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet nuget push nupkgs/*.nupkg
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate



